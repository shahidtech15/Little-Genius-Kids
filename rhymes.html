<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Rhymes | Little Genius</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;600;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .rhymes-container {
            padding: 3rem 5%;
            text-align: center;
            min-height: 80vh;
        }

        .page-header {
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 3.5rem;
            color: var(--card-yellow);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            overflow: hidden;
            transition: var(--transition);
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 1.5rem;
        }

        .video-info h3 {
            font-size: 1.5rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="images/logo.png" alt="Little Genius Kids Logo" class="brand-logo"> Little Genius
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="abc.html">ABC</a>
            <a href="numbers.html">Numbers</a>
            <a href="colors-shapes.html">Colors & Shapes</a>
            <a href="animals.html">Animals</a>
            <a href="games.html">Games</a>
        </nav>
        <div class="nav-actions">
            <button id="theme-toggle" class="btn-icon" aria-label="Toggle Dark Mode"><i
                    class="fa-solid fa-moon"></i></button>
            <a href="parents.html" class="btn-primary">Parents</a>
            <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <main class="rhymes-container">
        <header class="page-header">
            <h1 class="bounce-in">Sing Along to Fun Rhymes!</h1>
            <p>Watch, sing, and dance along with your favorite nursery rhymes.</p>
        </header>

        <section class="video-grid">
            <!-- Video 1 -->
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/yCjJyiqpAuU" title="Twinkle Twinkle Little Star"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen></iframe>
                </div>
                <div class="video-info">
                    <h3>Twinkle Twinkle Little Star</h3>
                </div>
            </div>

            <!-- Video 2 -->
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/e_04ZrNroTo" title="Wheels on the Bus"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen></iframe>
                </div>
                <div class="video-info">
                    <h3>Wheels on the Bus</h3>
                </div>
            </div>

            <!-- Video 3 -->
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/71hqRT9U0wg" title="Old MacDonald Had a Farm"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen></iframe>
                </div>
                <div class="video-info">
                    <h3>Old MacDonald Had a Farm</h3>
                </div>
            </div>

            <!-- Video 4 -->
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/XqZsoesa55w" title="Baby Shark"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen></iframe>
                </div>
                <div class="video-info">
                    <h3>Baby Shark Dance</h3>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Little Genius Kids Learning.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>

</html>
