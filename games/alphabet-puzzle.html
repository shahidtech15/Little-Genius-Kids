<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet Puzzle - Little Genius Kids</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-hero {
            padding: 8rem 5% 4rem;
            text-align: center;
            background: linear-gradient(135deg, #4CAF50 0%, #009688 100%);
            color: #fff;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .game-hero h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin-bottom: 1rem; }
        .game-container { max-width: 800px; margin: 4rem auto; padding: 3rem; background: #fff; border-radius: 30px; box-shadow: var(--shadow-lg); text-align: center; }
        .abc-piece { display: inline-block; padding: 1.5rem; background: #e0f2f1; border: 3px solid #009688; border-radius: 15px; margin: 0.5rem; font-size: 2.5rem; font-family: 'Fredoka One', cursive; color: #009688; cursor: pointer; transition: 0.3s; }
        .abc-piece:hover { transform: translateY(-5px); background: #b2dfdb; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="../index.html"><i class="fa-solid fa-graduation-cap"></i> Little Genius</a></div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="../ai-course.html">AI Course</a>
                <a href="../games.html" class="active">Games</a>
                <a href="../blog/index.html">Blog</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="game-hero">
            <h1>Alphabet Puzzle 🔠</h1>
            <p>Drag the letters to spell the words!</p>
        </section>
        <div class="game-container">
            <div>
                <span class="abc-piece">A</span><span class="abc-piece">B</span><span class="abc-piece">C</span>
            </div>
            <p style="margin-top:2rem;">Spell "CAT" to win! Full interactivity coming soon.</p>
            <a href="../games.html" class="btn-back" style="display:inline-block; margin-top:2rem; color:#009688; font-weight:700;"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        </div>
    </main>
</body>
</html>
