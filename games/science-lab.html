<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Lab - Little Genius Kids</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-hero {
            padding: 8rem 5% 4rem;
            text-align: center;
            background: linear-gradient(135deg, #6200EA 0%, #03A9F4 100%);
            color: #fff;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .game-hero h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin-bottom: 1rem; }
        .game-container { max-width: 800px; margin: 4rem auto; padding: 3rem; background: #fff; border-radius: 30px; box-shadow: var(--shadow-lg); text-align: center; }
        .lab-bench { height: 300px; background: #f5f5f5; border: 4px solid #6200EA; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 2rem; }
        .beaker { font-size: 4rem; color: #03A9F4; transition: 0.5s; }
        .beaker:hover { transform: rotate(20deg); color: #6200EA; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="../index.html"><i class="fa-solid fa-graduation-cap"></i> Little Genius</a></div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="../ai-course.html">AI Course</a>
                <a href="../games.html" class="active">Games</a>
                <a href="../blog/index.html">Blog</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="game-hero">
            <h1>Virtual Science Lab 🧪</h1>
            <p>Mix chemicals and watch what happens!</p>
        </section>
        <div class="game-container">
            <div class="lab-bench">
                <i class="fa-solid fa-flask beaker"></i>
                <i class="fa-solid fa-flask-vial beaker"></i>
                <i class="fa-solid fa-microscope beaker" style="color:#6200EA"></i>
            </div>
            <p style="margin-top:2rem;">Conduct amazing experiments safely.</p>
            <a href="../games.html" class="btn-back" style="display:inline-block; margin-top:2rem; color:#6200EA; font-weight:700;"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        </div>
    </main>
</body>
</html>
