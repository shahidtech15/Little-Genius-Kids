<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Puzzle Game - Little Genius Kids</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-hero {
            padding: 8rem 5% 4rem;
            text-align: center;
            background: linear-gradient(135deg, #FF9800 0%, #F44336 100%);
            color: #fff;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .game-hero h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin-bottom: 1rem; }
        .game-container { max-width: 800px; margin: 4rem auto; padding: 3rem; background: #fff; border-radius: 30px; box-shadow: var(--shadow-lg); text-align: center; }
        .puzzle-box { font-size: 4rem; padding: 2rem; background: #f5f5f5; border-radius: 20px; margin-bottom: 2rem; font-family: 'Fredoka One', cursive; color: #d32f2f; }
        .answer-input { font-size: 2rem; padding: 1rem; width: 150px; border-radius: 15px; border: 3px solid #FF9800; text-align: center; }
        .submit-btn { display: block; margin: 2rem auto; padding: 1rem 3rem; background: #FF9800; color: #fff; border: none; border-radius: 50px; font-size: 1.5rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { transform: scale(1.1); background: #F44336; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="../index.html"><i class="fa-solid fa-graduation-cap"></i> Little Genius</a></div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="../ai-course.html">AI Course</a>
                <a href="../games.html" class="active">Games</a>
                <a href="../blog/index.html">Blog</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="game-hero">
            <h1>Math Puzzle Game 🧮</h1>
            <p>Solve the puzzle to win points!</p>
        </section>
        <div class="game-container">
            <div id="question" class="puzzle-box">7 + 2 = ?</div>
            <input type="number" id="answer" class="answer-input" placeholder="?">
            <button class="submit-btn" onclick="checkAnswer()">Submit Answer</button>
            <div id="result" style="font-size: 1.5rem; font-weight: 700; margin-top: 1rem; min-height: 2rem;"></div>
            
            <button id="next-btn" class="btn-primary" style="display:none; margin: 1rem auto; padding: 0.8rem 2rem; border-radius: 50px; border: none; background: #4CAF50; color: #fff; font-weight: 700; cursor: pointer;" onclick="generateQuestion()">Next Puzzle ➡️</button>

            <a href="../games.html" class="btn-back" style="display:inline-block; margin-top:2rem; color:#F44336; font-weight:700;"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        </div>
    </main>

    <script>
        let num1, num2, answer;

        function generateQuestion() {
            num1 = Math.floor(Math.random() * 10) + 1;
            num2 = Math.floor(Math.random() * 10) + 1;
            answer = num1 + num2;
            document.getElementById("question").innerText = `${num1} + ${num2} = ?`;
            document.getElementById("answer").value = "";
            document.getElementById("result").innerText = "";
            document.getElementById("next-btn").style.display = "none";
            document.getElementById("answer").focus();
        }

        function checkAnswer() {
            const userAns = parseInt(document.getElementById("answer").value);
            const resultDiv = document.getElementById("result");
            
            if (isNaN(userAns)) {
                resultDiv.innerText = "Please enter a number! 🤔";
                resultDiv.style.color = "#FF9800";
                return;
            }

            if (userAns === answer) {
                resultDiv.innerText = "Fantastic! You got it right! 🎉";
                resultDiv.style.color = "#4CAF50";
                document.getElementById("next-btn").style.display = "block";
            } else {
                resultDiv.innerText = `Oops! Try again. The answer was ${answer}. 😅`;
                resultDiv.style.color = "#F44336";
                document.getElementById("next-btn").style.display = "block";
            }
        }

        // Initialize first question
        generateQuestion();

        // Listen for Enter key
        document.getElementById("answer").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
