<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Maze - Little Genius Kids</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-hero {
            padding: 8rem 5% 4rem;
            text-align: center;
            background: linear-gradient(135deg, #FF9800 0%, #F44336 100%);
            color: #fff;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .game-hero h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin-bottom: 1rem; }
        .game-container { max-width: 800px; margin: 4rem auto; padding: 3rem; background: #fff; border-radius: 30px; box-shadow: var(--shadow-lg); text-align: center; }
        .maze-placeholder { width: 100%; height: 300px; background: #eee; border: 3px dashed #FF9800; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #666; font-family: 'Fredoka One', cursive; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="../index.html"><i class="fa-solid fa-graduation-cap"></i> Little Genius</a></div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="../ai-course.html">AI Course</a>
                <a href="../games.html" class="active">Games</a>
                <a href="../blog/index.html">Blog</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="game-hero">
            <h1>Number Maze 🏁</h1>
            <p>Find the path to the finish line!</p>
        </section>
        <div class="game-container">
            <div class="maze-placeholder">Interactive Maze Coming Soon!</div>
            <p style="margin-top:2rem;">Use your keyboard arrows to move through the numbers.</p>
            <a href="../games.html" class="btn-back" style="display:inline-block; margin-top:2rem; color:#F44336; font-weight:700;"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>

    </main>

</html>
