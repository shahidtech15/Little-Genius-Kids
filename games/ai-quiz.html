<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz for Kids - Little Genius Kids</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-hero {
            padding: 8rem 5% 4rem;
            text-align: center;
            background: linear-gradient(135deg, #6200EA 0%, #03A9F4 100%);
            color: #fff;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .game-hero h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin-bottom: 1rem; }
        .game-container { max-width: 800px; margin: 4rem auto; padding: 3rem; background: #fff; border-radius: 30px; box-shadow: var(--shadow-lg); text-align: center; }
        .quiz-question { font-size: 1.8rem; font-weight: 700; margin-bottom: 2rem; color: #1a237e; }
        .option-list { list-style: none; padding: 0; display: grid; gap: 1rem; }
        .option-btn { padding: 1.2rem; background: #f5f5f5; border-radius: 15px; border: 2px solid #ddd; cursor: pointer; transition: 0.3s; font-size: 1.1rem; text-align: left; display: flex; align-items: center; gap: 1rem; }
        .option-btn:hover { background: #e8eaf6; border-color: #6200EA; transform: translateX(10px); }
        .option-btn i { color: #6200EA; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="../index.html"><i class="fa-solid fa-graduation-cap"></i> Little Genius</a></div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="../ai-course.html">AI Course</a>
                <a href="../games.html" class="active">Games</a>
                <a href="../blog/index.html">Blog</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="game-hero">
            <h1>AI Quiz Adventure 🤖</h1>
            <p>How much do you know about smart machines?</p>
        </section>
        <div class="game-container">
            <div class="quiz-question">Question 1: What does AI stand for?</div>
            <div class="option-list">
                <button class="option-btn" onclick="alert('Correct!')"><i class="fa-solid fa-circle-dot"></i> Artificial Intelligence</button>
                <button class="option-btn" onclick="alert('Try again!')"><i class="fa-solid fa-circle-dot"></i> Automatic Internet</button>
                <button class="option-btn" onclick="alert('Try again!')"><i class="fa-solid fa-circle-dot"></i> Awesome Invention</button>
            </div>
            <a href="../games.html" class="btn-back" style="display:inline-block; margin-top:3rem; color:#6200EA; font-weight:700;"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        </div>
    </main>
</body>
</html>
