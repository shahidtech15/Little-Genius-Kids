<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Recognition - Little Genius Kids</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .game-hero {
            padding: 8rem 5% 4rem;
            text-align: center;
            background: linear-gradient(135deg, #2196F3 0%, #673AB7 100%);
            color: #fff;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .game-hero h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin-bottom: 1rem; }
        .game-container { max-width: 800px; margin: 4rem auto; padding: 3rem; background: #fff; border-radius: 30px; box-shadow: var(--shadow-lg); text-align: center; }
        .pattern-row { display: flex; gap: 1.5rem; justify-content: center; font-size: 4rem; margin-bottom: 2rem; }
        .pattern-choice { padding: 1rem 2rem; background: #f5f5f5; border: 2px solid #ddd; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .pattern-choice:hover { background: #e3f2fd; border-color: #2196F3; transform: scale(1.1); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><a href="../index.html"><i class="fa-solid fa-graduation-cap"></i> Little Genius</a></div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="../ai-course.html">AI Course</a>
                <a href="../games.html" class="active">Games</a>
                <a href="../blog/index.html">Blog</a>
                <a href="../about.html">About</a>
                <a href="../contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="game-hero">
            <h1>Pattern Recognition 🧩</h1>
            <p>What comes next in the sequence?</p>
        </section>
        <div class="game-container">
            <div class="pattern-row">
                <span>🔴</span><span>🔵</span><span>🔴</span><span>?</span>
            </div>
            <div style="display:flex; gap:1rem; justify-content:center;">
                <button class="pattern-choice" onclick="alert('Great job!')">🔵</button>
                <button class="pattern-choice" onclick="alert('Try again!')">🟡</button>
                <button class="pattern-choice" onclick="alert('Try again!')">🟢</button>
            </div>
            <a href="../games.html" class="btn-back" style="display:inline-block; margin-top:2rem; color:#673AB7; font-weight:700;"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        </div>
    </main>
</body>
</html>
